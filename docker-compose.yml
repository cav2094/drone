services:
  controller:
    build: .
    command: python3 controller.py
    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DOMAIN_ID=0

  vision:
    build: .
    command: python3 vision.py
    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DOMAIN_ID=0
      - DISPLAY=host.docker.internal:0
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
    ports:
      - "5000:5000/udp"
