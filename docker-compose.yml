services:
  sensor:
    build: .
    command: python3 sensor.py
    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DOMAIN_ID=0

  controller:
    build: .
    command: python3 controller.py
    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DOMAIN_ID=0
    depends_on:
      - sensor

  vision:
    build: .
    command: python3 vision.py
    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DOMAIN_ID=0
      - DISPLAY=host.docker.internal:0
    ports:
      - "5000:5000/udp"
